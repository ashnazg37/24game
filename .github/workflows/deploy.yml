name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pi
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_IP }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/nextcloud/24game
            git pull origin main
            npm install --omit=dev
            pm2 restart 24game

      - name: Deploy to Ubuntu
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UBUNTU_IP }}
          username: ${{ secrets.UBUNTU_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/24game
            git pull origin main
            npm install --omit=dev
            pm2 restart 24game
