<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script>document.documentElement.dataset.theme=localStorage.getItem("theme")||"dark";</script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">24</div>
    <a href="dashboard.html" style="color:var(--muted);font-size:0.85rem;text-decoration:none;">← Back</a>
  </nav>

  <div class="container" style="max-width:680px;padding-top:32px;">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <h1 class="card-title" style="margin-bottom:0;">Global Leaderboard</h1>
        <button id="refresh-btn" class="btn btn-secondary" style="width:auto;padding:8px 18px;font-size:0.85rem;">
          Refresh
        </button>
      </div>

      <p id="loading" style="color:var(--muted);text-align:center;padding:32px;">Loading…</p>
      <p id="empty"   style="display:none;color:var(--muted);text-align:center;padding:32px;">No games played yet.</p>

      <table class="lb-table" id="lb-table" style="display:none;">
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th style="text-align:right;">ELO</th>
            <th style="text-align:right;">Wins</th>
            <th style="text-align:right;">Played</th>
            <th style="text-align:right;">Win %</th>
          </tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="leaderboard.js"></script>
  <script type="module">import{initTheme}from"./utils.js";initTheme();</script>
</body>
</html>
