<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <!-- defer (not async) guarantees GIS is ready before auth.js (module) runs -->
  <script src="https://accounts.google.com/gsi/client" defer></script>
</head>
<body class="page-center">
  <div class="landing-card">
    <div class="landing-logo">24</div>
    <p class="landing-tagline">Four numbers. Four operations. Make 24 before anyone else.</p>
    <!-- Must be a <div>, not <button> — GIS renderButton only works correctly on a div -->
    <div id="sign-in-btn" style="display:flex;justify-content:center;margin-top:8px;"></div>
    <a href="practice.html" style="display:block;margin-top:16px;color:var(--muted);font-size:0.85rem;text-decoration:none;">
      Practice without signing in →
    </a>
  </div>
  <script type="module" src="auth.js"></script>
</body>
</html>
