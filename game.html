<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>24 Game — Playing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">24</div>
    <span id="round-display" style="font-family:var(--font-mono);font-size:0.82rem;color:var(--muted);"></span>
    <div style="display:flex;align-items:center;gap:10px;">
      <strong id="room-code-nav" style="font-family:var(--font-mono);font-size:0.78rem;color:var(--accent);letter-spacing:0.1em;"></strong>
      <img id="user-photo" src="" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--border);" onerror="this.style.display='none'">
    </div>
  </nav>
  <div class="game-layout">
    <div class="card" style="padding:18px;">
      <!-- Active round -->
      <div id="round-view">
        <p id="expr-display" style="font-family:'Space Mono',monospace;font-size:0.9rem;color:var(--accent);text-align:center;min-height:1.4em;margin-bottom:4px;letter-spacing:0.03em;word-break:break-all;"></p>
        <p id="card-hint" style="text-align:center;font-size:0.82rem;color:var(--muted);margin-bottom:8px;min-height:1.2em;">Pick a number</p>
        <div id="card-grid"></div>
        <p class="error-msg" id="input-error"></p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">
          <button id="undo-btn" class="btn btn-secondary">↩ Undo</button>
          <button id="skip-btn" class="btn btn-secondary">Skip (<span id="skip-count">0</span>/<span id="skip-needed">?</span>)</button>
        </div>
      </div>
      <!-- Result -->
      <div id="result-view" style="display:none;" class="result-center">
        <div id="result-content"></div>
        <button id="next-round-btn" class="btn btn-primary" style="display:none;max-width:180px;">Next Round →</button>
        <p id="waiting-for-host" style="display:none;color:var(--muted);font-size:0.9rem;">Waiting for host…</p>
        <p id="auto-advance-msg" class="auto-advance" style="display:none;"></p>
      </div>
      <!-- Game over -->
      <div id="end-view" style="display:none;">
        <h2 class="card-title" id="end-title">Game Over</h2>
        <p id="abandon-msg" style="display:none;color:var(--muted);text-align:center;margin-bottom:16px;font-size:0.9rem;"></p>
        <div id="final-scores"></div>
        <p id="elo-change-msg" style="display:none;text-align:center;margin-top:12px;font-family:var(--font-mono);font-size:0.88rem;"></p>
        <div class="end-buttons">
          <a href="dashboard.html" class="btn btn-secondary">New Game</a>
          <a href="leaderboard.html" class="btn btn-primary">Leaderboard</a>
        </div>
      </div>
    </div>
    <!-- Sidebar -->
    <div>
      <p class="sidebar-title">This Game</p>
      <ul class="player-list" id="room-leaderboard" style="margin-bottom:20px;"></ul>
      <div id="elo-section">
        <p class="sidebar-title">ELO</p>
        <ul class="player-list" id="elo-list" style="margin-bottom:20px;"></ul>
      </div>
      <p id="rated-badge" style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:14px;"></p>
      <button id="resign-btn" class="btn btn-secondary" style="border-color:var(--danger);color:var(--danger);">Resign</button>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
