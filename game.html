<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24 Game — Playing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.dataset.theme=localStorage.getItem("theme")||"dark";</script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">24</div>
    <span id="round-display" style="font-family:var(--font-mono);font-size:0.88rem;color:var(--muted);"></span>
    <div style="display:flex;align-items:center;gap:14px;">
      <strong id="room-code-nav" style="font-family:var(--font-mono);font-size:0.82rem;color:var(--accent);letter-spacing:0.1em;"></strong>
      <img id="user-photo" src="" style="width:30px;height:30px;border-radius:50%;border:2px solid var(--border);" onerror="this.style.display='none'">
      <button id="theme-btn" onclick="import('./utils.js').then(m=>m.toggleTheme())" title="Toggle theme">☀</button>
    </div>
  </nav>

  <div class="game-layout">

    <div class="card" style="padding:20px;">

      <div id="round-view">
        
        <div class="numbers-grid-container">
          <div class="numbers-grid" id="keypad-numbers"></div>
          
          <div class="op-popup" id="op-popup">
            <button class="key key-op-pop key-op" data-val="+">+</button>
            <button class="key key-op-pop key-op" data-val="-">−</button>
            <button class="key key-op-pop key-op" data-val="*">×</button>
            <button class="key key-op-pop key-op" data-val="/">÷</button>
          </div>
        </div>

        <div class="expr-display" id="expr-display">
          <span id="expr-text"></span><span class="cursor"></span>
        </div>
        <p class="error-msg" id="input-error"></p>

        <div class="keypad-row" style="margin-top:12px;">
          <button class="key key-paren" data-val="(">(</button>
          <button class="key key-paren" data-val=")">)</button>
          <button class="key key-back"  id="key-back">⌫</button>
          <button class="key key-clear" id="key-clear">C</button>
        </div>

        <div class="action-row" style="margin-top:12px;">
          <button id="submit-btn" class="btn btn-primary">Submit</button>
          <button id="skip-btn"   class="btn btn-secondary">
            Skip (<span id="skip-count">0</span>/<span id="skip-needed">?</span>)
          </button>
        </div>
      </div>

      <div id="result-view" style="display:none;" class="result-center">
        <div id="result-content"></div>
        <button id="next-round-btn" class="btn btn-primary" style="display:none;max-width:180px;">Next Round →</button>
        <p id="waiting-for-host" style="display:none;color:var(--muted);font-size:0.9rem;">Waiting for host…</p>
        <p id="auto-advance-msg" class="auto-advance" style="display:none;"></p>
      </div>

      <div id="end-view" style="display:none;">
        <h2 class="card-title" id="end-title">Game Over</h2>
        <p id="abandon-msg" style="display:none;color:var(--muted);text-align:center;margin-bottom:16px;font-size:0.9rem;"></p>
        <div id="final-scores"></div>
        <div class="end-buttons">
          <a href="dashboard.html" class="btn btn-secondary">New Game</a>
          <a href="leaderboard.html" class="btn btn-primary">Leaderboard</a>
        </div>
      </div>

    </div>

    <div>
      <p class="sidebar-title">This Game</p>
      <ul class="player-list" id="room-leaderboard" style="margin-bottom:20px;"></ul>

      <div id="elo-section">
        <p class="sidebar-title">ELO</p>
        <ul class="player-list" id="elo-list" style="margin-bottom:20px;"></ul>
      </div>

      <button id="resign-btn" class="btn btn-secondary" style="border-color:var(--danger);color:var(--danger);">
        Resign
      </button>
    </div>

  </div>

  <script type="module" src="game.js"></script>
  <script type="module">import{initTheme}from"./utils.js";initTheme();</script>
</body>
</html>
