<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24 Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    @media(max-width:580px){ .mode-grid{grid-template-columns:1fr;} }
    .mode-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:6px; }
    .idle-state.hidden { display:none; }
    .searching-state { display:none; text-align:center; padding:4px 0; }
    .searching-state.visible { display:block; }
    .pulse-ring { display:inline-block; width:44px; height:44px; border:3px solid var(--accent); border-radius:50%; animation:pulse 1.4s ease-in-out infinite; margin-bottom:12px; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.18);opacity:0.35} }
    .searching-text { font-family:var(--font-mono); font-size:0.88rem; color:var(--muted); margin-bottom:14px; }
    .searching-text em { color:var(--accent); font-style:normal; }
    .join-row { display:flex; gap:10px; }
    .join-row input { flex:1; }
    .join-row .btn { width:auto; padding:12px 22px; }
    /* Invitations */
    .invite-card {
      background:var(--accent-dim); border:1px solid rgba(129,140,248,0.35);
      border-radius:var(--radius-sm); padding:14px 16px;
      display:flex; align-items:center; gap:12px; margin-bottom:10px;
    }
    .invite-card .invite-info { flex:1; }
    .invite-card .invite-from { font-weight:600; font-size:0.95rem; }
    .invite-card .invite-type { font-size:0.78rem; color:var(--muted); margin-top:2px; }
    .invite-card .invite-btns { display:flex; gap:8px; flex-shrink:0; }
    .invite-card .invite-btns .btn { width:auto; padding:8px 16px; font-size:0.82rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">24</div>
    <div class="nav-user">
      <img id="user-photo" src="" alt="" onerror="this.style.display='none'">
      <span id="user-name"></span>
      <button id="sign-out-btn" class="btn btn-ghost">Sign out</button>
    </div>
  </nav>

  <div class="container" style="padding-top:28px;max-width:760px;">

    <!-- Pending invitations (hidden when none) -->
    <div id="invitations-section" style="display:none;margin-bottom:20px;">
      <p class="mode-label" style="margin-bottom:10px;">Pending invitations</p>
      <div id="invitations-list"></div>
    </div>

    <div class="mode-grid">

      <!-- 1v1 -->
      <div class="card">
        <p class="mode-label">Quick match</p>
        <h2 class="card-title" style="margin-bottom:6px;">1v1</h2>
        <p style="color:var(--muted);font-size:0.87rem;margin-bottom:10px;">Auto-paired with another player. 3 rounds.</p>
        <p id="waiting-count" style="font-family:var(--font-mono);font-size:0.82rem;color:var(--accent);margin-bottom:16px;">— waiting</p>
        <div id="idle-state">
          <button id="find-btn" class="btn btn-primary">Find Opponent</button>
          <button id="copy-invite-btn" class="btn btn-secondary" style="margin-top:8px;">Copy invite link</button>
        </div>
        <div class="searching-state" id="searching-state">
          <div class="pulse-ring"></div>
          <p class="searching-text">Searching<em id="dots">...</em></p>
          <button id="cancel-btn" class="btn btn-secondary">Cancel</button>
        </div>
      </div>

      <!-- Create Room -->
      <div class="card">
        <p class="mode-label">Class / group</p>
        <h2 class="card-title" style="margin-bottom:6px;">Create Room</h2>
        <div class="form-group">
          <label>Room code</label>
          <div class="room-code" id="preview-code" style="font-size:1.8rem;padding:14px;">——————</div>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:14px;">
          <div class="form-group" style="flex:1;margin-bottom:0;">
            <label>Rounds</label>
            <input type="number" id="total-rounds" value="10" min="1" max="50">
          </div>
          <div class="form-group" style="flex:1;margin-bottom:0;">
            <label>Skip</label>
            <select id="skip-mode">
              <option value="majority">Majority</option>
              <option value="unanimous">All</option>
            </select>
          </div>
        </div>
        <button id="create-btn" class="btn btn-primary">Create Room</button>
        <button id="copy-room-link-btn" class="btn btn-secondary" style="margin-top:8px;">Copy room link</button>
      </div>

    </div>

    <!-- Join -->
    <div class="card" style="margin-bottom:20px;">
      <p class="mode-label">Join a room</p>
      <div class="join-row">
        <input type="text" id="join-input" placeholder="ABCD12" maxlength="6" autocomplete="off"
          style="text-transform:uppercase;letter-spacing:0.15em;font-size:1.3rem;text-align:center;">
        <button id="join-btn" class="btn btn-secondary">Join</button>
      </div>
      <p class="error-msg" id="error-msg"></p>
    </div>

    <!-- Invite a player -->
    <div class="card" style="margin-bottom:20px;">
      <p class="mode-label">Direct challenge</p>
      <h2 class="card-title" style="margin-bottom:6px;">Invite a Player</h2>
      <p style="color:var(--muted);font-size:0.87rem;margin-bottom:14px;">
        Enter a username or @stjohnscollege.co.za email address.
      </p>
      <div class="join-row" style="margin-bottom:10px;">
        <input type="text" id="invite-input"
          placeholder="username or email"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          name="invite-search-field"
          data-lpignore="true"
          data-form-type="other">
      </div>
      <div style="display:flex;gap:10px;">
        <button id="invite-1v1-btn" class="btn btn-primary" style="flex:1;">Challenge to 1v1</button>
        <button id="invite-room-btn" class="btn btn-secondary" style="flex:1;">Invite to Room</button>
      </div>
      <p class="error-msg" id="invite-error"></p>
      <p id="invite-success" style="display:none;color:var(--success,#34d399);font-size:0.85rem;margin-top:10px;"></p>
    </div>

    <div style="text-align:center;margin-top:4px;display:flex;gap:24px;justify-content:center;">
      <a href="leaderboard.html" style="color:var(--muted);font-size:0.84rem;text-decoration:none;">Leaderboard →</a>
      <a href="practice.html"   style="color:var(--accent);font-size:0.84rem;text-decoration:none;">Practice →</a>
    </div>

  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
